<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoria V.O.E — Acesso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0d1520;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#162030;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:44px 40px;width:100%;max-width:520px}
h1{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#8a9bb0;font-size:0.95rem;margin-bottom:32px}
label{display:block;font-size:0.78rem;font-weight:600;color:#8a9bb0;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
input{width:100%;padding:18px 20px;background:#0d1520;border:2px solid #2a4a6a;border-radius:12px;color:#fff;font-size:1rem;font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;outline:none}
input:focus{border-color:#4ab8e8;box-shadow:0 0 0 3px rgba(74,184,232,0.12)}
input::placeholder{color:#3a5570}
button{width:100%;margin-top:20px;padding:18px;background:#3a7fa8;border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s,transform 0.1s;letter-spacing:0.3px}
button:hover{background:#4a9aca}
button:active{transform:scale(0.99)}
.footer{margin-top:32px;text-align:center;font-size:0.85rem;color:#5a7a95}
.footer a{color:#4ab8e8;text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
.error{display:none;color:#f87171;font-size:0.82rem;margin-top:8px}
</style>
</head>
<body>


<div class="card">
  <h1>Bem-vindo!</h1>
  <p class="subtitle">Digite seu CPF para acessar.</p>
  <label for="cpf">CPF</label>
  <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" autocomplete="off">
  <span class="error" id="erro">Por favor, preencha o CPF.</span>
  <button onclick="acessar()">Acessar agora</button>
</div>

<p class="footer">Problemas para acessar? <a href="#">Falar com suporte</a></p>

<script>
const input = document.getElementById('cpf');
const erro = document.getElementById('erro');

input.addEventListener('input', () => {
  let v = input.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  input.value = v;
  erro.style.display = 'none';
});

input.addEventListener('keydown', e => { if (e.key === 'Enter') acessar(); });

function acessar() {
  const cpf = input.value.replace(/\D/g, '');
  if (cpf.length < 11) {
    erro.style.display = 'block';
    input.focus();
    return;
  }
  window.location.href = 'ebook.html';
}
</script>
</body>
</html>
