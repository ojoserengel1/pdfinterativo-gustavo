<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessão do Sábado - Gustavo Drop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,800;1,9..144,200;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#07070B;
  --panel-left:#08080D;
  --glass:rgba(255,255,255,0.025);
  --glass-border:rgba(255,255,255,0.07);
  --gold:#E9A430;
  --gold-dim:rgba(233,164,48,0.15);
  --gold-glow:rgba(233,164,48,0.35);
  --white:#EDE9E2;
  --muted:rgba(237,233,226,0.4);
  --muted2:rgba(237,233,226,0.18);
  --error:#FF7B6B;
  --teal:rgba(0,180,160,0.08);
  --amber-glow:rgba(233,164,48,0.07);
}

html{height:100%}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  display:flex;
  overflow-x:hidden;
}

/* ── NOISE OVERLAY ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:0.6;
}

/* ── AMBIENT ORBS ── */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
  z-index:0;
}
.orb-1{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(233,164,48,0.09) 0%,transparent 70%);
  top:-200px;right:-100px;
}
.orb-2{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(0,180,160,0.07) 0%,transparent 70%);
  bottom:-150px;left:-100px;
}
.orb-3{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(233,164,48,0.05) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
}

/* ── LAYOUT ── */
.layout{
  display:flex;
  width:100%;
  min-height:100vh;
  position:relative;
  z-index:1;
}

/* ── LEFT PANEL ── */
.left{
  flex:0 0 55%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 72px;
  position:relative;
  overflow:hidden;
}

.left::after{
  content:'';
  position:absolute;
  top:10%;bottom:10%;
  right:0;
  width:1px;
  background:linear-gradient(to bottom,transparent,var(--glass-border) 30%,var(--glass-border) 70%,transparent);
}

.event-tag{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-family:'Outfit',sans-serif;
  font-size:0.72rem;
  font-weight:500;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:48px;
  opacity:0;
  animation:fadeUp 0.8s ease 0.1s forwards;
}

.event-tag::before{
  content:'';
  display:block;
  width:28px;height:1px;
  background:var(--gold);
}

.event-tag .dot{
  width:4px;height:4px;
  border-radius:50%;
  background:var(--gold);
  opacity:0.6;
}

.headline{
  font-family:'Fraunces',serif;
  line-height:0.92;
  letter-spacing:-1px;
  margin-bottom:32px;
  opacity:0;
  animation:fadeUp 0.9s ease 0.25s forwards;
}

.headline .line1{
  font-size:clamp(3.5rem,6vw,6.5rem);
  font-weight:300;
  font-style:italic;
  color:var(--white);
  display:block;
}

.headline .line2{
  font-size:clamp(4.5rem,7.5vw,8.5rem);
  font-weight:800;
  color:var(--white);
  display:block;
  margin-top:-8px;
}

.headline .accent{
  color:var(--gold);
}

.divider-line{
  width:64px;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent);
  margin-bottom:28px;
  opacity:0;
  animation:fadeUp 0.9s ease 0.4s forwards;
}

.tagline{
  font-family:'Outfit',sans-serif;
  font-size:clamp(0.95rem,1.5vw,1.15rem);
  font-weight:300;
  color:var(--muted);
  letter-spacing:0.3px;
  line-height:1.7;
  max-width:380px;
  margin-bottom:48px;
  opacity:0;
  animation:fadeUp 0.9s ease 0.5s forwards;
}

.date-badge{
  display:inline-flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  background:var(--gold-dim);
  border:1px solid rgba(233,164,48,0.25);
  border-radius:100px;
  opacity:0;
  animation:fadeUp 0.9s ease 0.6s forwards;
}

.date-badge .cal{
  font-size:1.1rem;
}

.date-badge .date-text{
  font-size:0.82rem;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--gold);
}

/* ── DECORATIVE ELEMENTS ── */
.deco-circle{
  position:absolute;
  bottom:-120px;right:60px;
  width:320px;height:320px;
  border-radius:50%;
  border:1px solid rgba(233,164,48,0.06);
  opacity:0;
  animation:fadeIn 1.5s ease 1s forwards;
}

.deco-circle::before{
  content:'';
  position:absolute;
  inset:30px;
  border-radius:50%;
  border:1px solid rgba(233,164,48,0.04);
}

.deco-circle::after{
  content:'';
  position:absolute;
  inset:60px;
  border-radius:50%;
  border:1px solid rgba(233,164,48,0.03);
}

/* ── RIGHT PANEL ── */
.right{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 48px;
}

.form-card{
  width:100%;
  max-width:400px;
  opacity:0;
  animation:fadeUp 1s ease 0.4s forwards;
}

.form-header{
  margin-bottom:44px;
}

.greeting{
  font-family:'Fraunces',serif;
  font-size:2.8rem;
  font-weight:800;
  color:var(--white);
  line-height:1.1;
  margin-bottom:10px;
}

.greeting em{
  font-style:italic;
  font-weight:200;
  color:var(--muted);
  font-size:1.5rem;
  display:block;
  margin-bottom:4px;
}

.form-desc{
  font-size:0.9rem;
  color:var(--muted);
  font-weight:300;
  line-height:1.6;
}

/* ── CPF INPUT ── */
.field-wrap{
  position:relative;
  margin-bottom:8px;
}

.field-label{
  display:block;
  font-size:0.68rem;
  font-weight:600;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(237,233,226,0.3);
  margin-bottom:12px;
  transition:color 0.3s;
}

.field-wrap:focus-within .field-label{
  color:var(--gold);
}

.cpf-input{
  width:100%;
  padding:18px 0;
  background:transparent;
  border:none;
  border-bottom:1.5px solid rgba(255,255,255,0.1);
  color:var(--white);
  font-family:'Outfit',sans-serif;
  font-size:1.4rem;
  font-weight:300;
  letter-spacing:3px;
  outline:none;
  transition:border-color 0.3s;
  caret-color:var(--gold);
}

.cpf-input::placeholder{
  color:rgba(237,233,226,0.12);
  letter-spacing:2px;
}

.cpf-input:focus{
  border-bottom-color:rgba(233,164,48,0.4);
}

.field-line{
  position:absolute;
  bottom:0;left:50%;
  width:0;height:1.5px;
  background:var(--gold);
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1),left 0.4s cubic-bezier(0.4,0,0.2,1);
}

.field-wrap:focus-within .field-line{
  width:100%;
  left:0;
}

.err-msg{
  display:none;
  font-size:0.78rem;
  color:var(--error);
  margin-top:10px;
  letter-spacing:0.3px;
  animation:shake 0.4s ease;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ── BUTTON ── */
.btn-wrap{
  margin-top:44px;
  position:relative;
}

.cta-btn{
  width:100%;
  padding:18px 32px;
  background:linear-gradient(135deg,#E9A430 0%,#C97D10 100%);
  border:none;
  border-radius:6px;
  color:#0A0700;
  font-family:'Outfit',sans-serif;
  font-size:0.9rem;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow:0 4px 30px rgba(233,164,48,0.18);
}

.cta-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
  transform:skewX(-20deg);
  transition:left 0.6s ease;
}

.cta-btn:hover::before{
  left:160%;
}

.cta-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 40px rgba(233,164,48,0.3);
}

.cta-btn:active{
  transform:translateY(0) scale(0.99);
}

.btn-arrow{
  display:inline-block;
  margin-left:8px;
  transition:transform 0.2s ease;
}

.cta-btn:hover .btn-arrow{
  transform:translateX(3px);
}

/* ── BRAND FOOTER ── */
.brand-footer{
  margin-top:52px;
  padding-top:24px;
  border-top:1px solid var(--glass-border);
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--gold);
  opacity:0.7;
}

.brand-name{
  font-family:'Fraunces',serif;
  font-size:0.85rem;
  font-weight:300;
  color:var(--muted);
  letter-spacing:1px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* ── MOBILE ── */
@media(max-width:768px){
  .layout{flex-direction:column}

  .left{
    flex:none;
    padding:60px 28px 44px;
  }

  .left::after{
    display:none;
  }

  .headline .line1{font-size:3rem}
  .headline .line2{font-size:3.8rem}

  .tagline{display:none}

  .deco-circle{display:none}

  .right{
    padding:16px 28px 60px;
    align-items:flex-start;
  }

  .form-card{
    max-width:100%;
  }
}

@media(max-width:420px){
  .left{padding:48px 24px 36px}
  .right{padding:12px 24px 52px}
  .headline .line1{font-size:2.5rem}
  .headline .line2{font-size:3.2rem}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="event-tag">
      Evento exclusivo <span class="dot"></span> Gustavo Drop
    </div>

    <h1 class="headline">
      <span class="line1">Sessão do</span>
      <span class="line2">Sá<span class="accent">ba</span>do</span>
    </h1>

    <div class="divider-line"></div>

    <p class="tagline">
      Do Zero à Primeira Venda no<br>
      Novo Drop Global
    </p>

    <div class="date-badge">
      <span class="cal">📅</span>
      <span class="date-text">18 de Abril &nbsp;·&nbsp; 16h</span>
    </div>

    <div class="deco-circle"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="form-card">

      <div class="form-header">
        <div class="greeting">
          <em>Olá,</em>
          Bem-vindo!
        </div>
        <p class="form-desc">Digite seu CPF para acessar o material da sessão.</p>
      </div>

      <div class="field-wrap">
        <label class="field-label" for="cpf">CPF</label>
        <input
          class="cpf-input"
          type="text"
          id="cpf"
          placeholder="000.000.000-00"
          maxlength="14"
          inputmode="numeric"
          autocomplete="off"
        >
        <div class="field-line"></div>
      </div>
      <span class="err-msg" id="erro">Por favor, preencha o CPF completo.</span>

      <div class="btn-wrap">
        <button class="cta-btn" onclick="acessar()">
          Acessar agora <span class="btn-arrow">→</span>
        </button>
      </div>

      <div class="brand-footer">
        <div class="brand-dot"></div>
        <span class="brand-name">Gustavo Drop · Sessão do Sábado</span>
      </div>

    </div>
  </div>

</div>

<script>
const input = document.getElementById('cpf');
const erro = document.getElementById('erro');

input.addEventListener('input', () => {
  let v = input.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  input.value = v;
  erro.style.display = 'none';
});

input.addEventListener('keydown', e => { if (e.key === 'Enter') acessar(); });

function acessar() {
  const cpf = input.value.replace(/\D/g, '');
  if (cpf.length < 11) {
    erro.style.display = 'block';
    input.focus();
    return;
  }
  window.location.href = 'index3.html';
}
</script>
</body>
</html>
